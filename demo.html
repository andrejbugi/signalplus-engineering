<!DOCTYPE html>
<html lang="mk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Демо | Signal Plus Engineering</title>
  <meta name="description" content="Демо страница за Signal Plus Engineering SaaS платформа за одржување на лифтови." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    try {
      document.documentElement.dataset.theme = localStorage.getItem('signalplus-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    } catch (error) {
      document.documentElement.dataset.theme = 'light';
    }
  </script>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="demo-page">
  <header class="site-header">
    <nav class="navbar container">
      <a class="brand" href="index.html" aria-label="Signal Plus Engineering home">
        <img class="brand-logo logo-on-light" src="assets/img/dark logo full.png" alt="Signal Plus Solutions" />
        <img class="brand-logo logo-on-dark" src="assets/img/light logo full.png" alt="" aria-hidden="true" />
      </a>
      <div class="nav-menu static">
        <a href="index.html#platform">Платформа</a>
        <button class="theme-toggle" type="button" aria-label="Switch to dark theme" aria-pressed="false">
          <span class="theme-toggle-icon" aria-hidden="true"></span>
        </button>
        <a href="index.html#contact" class="nav-cta">Закажи демо</a>
      </div>
    </nav>
  </header>

  <main class="coming-soon-wrap">
    <section class="coming-soon-card">
      <p class="eyebrow">Демо страница</p>
      <h1>Демото наскоро ќе биде достапно.</h1>
      <p>
        Подготвуваме преглед на системот со пример dashboard, листа на лифтови,
        статуси за одржување, потсетници и основна демо навигација.
      </p>
      <div class="hero-actions center-actions">
        <a class="btn btn-primary" href="index.html#contact">Закажи демо</a>
        <a class="btn btn-secondary" href="index.html">Назад кон почетна</a>
      </div>
    </section>
  </main>

  <script src="assets/js/main.js"></script>
</body>
</html>
